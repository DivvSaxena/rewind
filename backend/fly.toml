# Fly.io config for the Rewind backend.
# Deploy: ./export_memory.sh && fly launch --copy-config --no-deploy && fly secrets set GROQ_API_KEY=... && fly deploy
app = "rewind-backend"
primary_region = "bom"

[build]
  dockerfile = "Dockerfile"

[env]
  LLM_MODEL = "groq/llama-3.1-8b-instant"
  # Set to the deployed frontend origin(s), comma-separated.
  CORS_ORIGINS = "http://localhost:3000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
