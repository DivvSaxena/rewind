# fly.toml app configuration file generated for rewind-backend on 2026-07-05T00:38:25+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'rewind-backend'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[env]
  CORS_ORIGINS = 'https://rewind-frontend.fly.dev,https://rewind-pink.vercel.app,http://localhost:3000'
  LLM_MODEL = 'groq/llama-3.3-70b-versatile'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
