# Fly.io config for the Rewind frontend.
# Deploy: fly launch --copy-config --no-deploy && fly deploy --build-arg NEXT_PUBLIC_API_URL=https://<backend-app>.fly.dev
app = "rewind-frontend"
primary_region = "bom"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
